<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>FAZZ club logo</title>
<desc>A circular emblem on a white background with an open purple ring symbolizing a zero barrier zone, an upward arrow breaking through the gap, the bold wordmark FAZZ in a modern purple gradient, and the tagline future advancements in a zero barrier zone.</desc>
<defs>
<linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#8B5CF6"/>
<stop offset="100%" stop-color="#5B21B6"/>
</linearGradient>
<linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#A78BFA"/>
<stop offset="100%" stop-color="#6D28D9"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="680" height="620" fill="#FFFFFF"/>

<circle cx="340" cy="240" r="150" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round"
  stroke-dasharray="820 60" stroke-dashoffset="-40" transform="rotate(-90 340 240)"/>

<polygon points="340,95 322,140 358,140" fill="url(#purpleGrad)"/>
<rect x="330" y="130" width="20" height="70" fill="url(#purpleGrad)"/>

<text x="340" y="430" text-anchor="middle" font-size="78" font-weight="700" letter-spacing="12" fill="url(#purpleGrad)" font-family="'Helvetica Neue', Arial, sans-serif">FAZZ</text>

<text x="340" y="466" text-anchor="middle" font-size="16" letter-spacing="4" fill="#7C3AED" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400">FUTURE ADVANCEMENTS</text>
<text x="340" y="490" text-anchor="middle" font-size="16" letter-spacing="4" fill="#7C3AED" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400">IN A ZERO BARRIER ZONE</text>

<circle cx="340" cy="240" r="188" fill="none" stroke="#EDE9FE" stroke-width="2"/>
</svg>
